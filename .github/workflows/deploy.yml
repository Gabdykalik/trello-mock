name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches:
      - main # Run this action when pushing to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          persist-credentials: false # Use new credentials for push

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm ci

      - name: Generate static files
        run: npm run generate

      - name: Clean up the working directory
        run: git rm -r --cached . || true && git clean -fdx || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true # Ensure there are no commit history issues
